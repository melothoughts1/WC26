<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Randall's World Cup 2026</title>
<meta name="description" content="Randall's auto-updating circular bracket for the 2026 World Cup knockout stage. Live scores, static page, no backend." />
<style>
  :root{
    --bg:#f7f8fa;
    --ink:#1c1b18;
    --line:#2a2823;
    --muted:#9a948a;
    --gold:#c8a24a;
    --adv:#2f9e4f;
    --live:#d1493a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
  }
  header{
    text-align:center;
    padding:18px 12px 4px;
  }
  header h1{
    margin:0;
    font-size:clamp(20px,3.4vw,34px);
    font-weight:800;
    letter-spacing:.2px;
  }
  header .sub{
    margin-top:4px;color:var(--muted);font-size:13px;
  }
  /* Square responsive stage that holds the SVG (lines/dots/trophy) and the flag overlay */
  .stage{
    position:relative;
    width:min(94vw, 86vh, 920px);
    aspect-ratio:1/1;
    margin:6px auto 4px;
  }
  .stage svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .conn{fill:none;stroke:var(--line);stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round;opacity:.55}
  .dot{fill:var(--bg);stroke:var(--line);stroke-width:1.6}
  .center-line{stroke:var(--line);stroke-width:1.6;stroke-linecap:round;opacity:.55}

  /* Flags are HTML imgs positioned over the SVG so circular clipping is trivial */
  .flag{
    position:absolute;
    transform:translate(-50%,-50%);
    border-radius:50%;
    object-fit:cover;
    background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.18);
    border:2px solid #fff;
    aspect-ratio:1/1;
    cursor:default;
    transition:width .25s ease, height .25s ease;
  }
  .flag.r0{width:6.6%}
  .flag.r1{width:5.7%}
  .flag.r2{width:5.2%}
  .flag.r3{width:5.0%}
  .flag.r4{width:5.0%}
  .flag.champ{width:9%;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold),0 2px 8px rgba(0,0,0,.3)}
  .flag.eliminated{filter:grayscale(.7) opacity(.78);border-color:var(--ink)}
  .flag.win{border-color:var(--adv);box-shadow:0 0 0 2px var(--adv),0 1px 3px rgba(0,0,0,.18)}
  .flag.pop{animation:pop .55s cubic-bezier(.2,1.5,.4,1)}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(.1);opacity:0}60%{transform:translate(-50%,-50%) scale(1.18)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
  /* Subtle status cues for the two teams about to play a match.
     .soon = static soft gold ring; .live = gently pulsing red halo. */
  .flag.soon{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 1px 3px rgba(0,0,0,.18)}
  .flag.live{border-color:var(--live);animation:livePulse 1.7s ease-in-out infinite}
  @keyframes livePulse{
    0%,100%{box-shadow:0 0 0 2px var(--live),0 0 5px 1px rgba(209,73,58,.30),0 1px 3px rgba(0,0,0,.18)}
    50%{box-shadow:0 0 0 3px var(--live),0 0 12px 4px rgba(209,73,58,.55),0 1px 3px rgba(0,0,0,.18)}
  }

  /* Custom hover/tap tooltip showing the match score */
  .tooltip{
    position:fixed;z-index:50;pointer-events:none;
    background:#1c1b18;color:#f2ede1;
    padding:7px 12px;border-radius:10px;
    font-size:13px;line-height:1.35;text-align:center;white-space:nowrap;
    box-shadow:0 6px 18px rgba(0,0,0,.30);
    opacity:0;transform:translate(-50%,-100%) translateY(-6px) scale(.96);
    transition:opacity .12s ease, transform .12s ease;
  }
  .tooltip.on{opacity:1;transform:translate(-50%,-100%) translateY(-10px) scale(1)}
  .tooltip::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%) rotate(45deg);
    width:10px;height:10px;background:#1c1b18;border-radius:2px}
  /* flipped below the flag (for flags near the top edge) */
  .tooltip.below{transform:translate(-50%,0) translateY(6px) scale(.96)}
  .tooltip.below.on{transform:translate(-50%,0) translateY(10px) scale(1)}
  .tooltip.below::after{top:-5px;bottom:auto}
  .tooltip .tt-round{font-size:10px;letter-spacing:.7px;text-transform:uppercase;font-weight:700;color:var(--gold)}
  .tooltip .tt-teams{font-weight:600;margin-top:2px}
  .tooltip .tt-score{margin-top:3px;font-size:16px;font-weight:800}
  .tooltip .tt-score.pending{font-size:12px;font-weight:500;color:#cfc9bd}
  .tooltip .tt-score.live{color:#ff7a68}
  .tooltip .tt-score.live .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
    background:var(--live);margin-right:6px;vertical-align:middle;animation:livePulse 1.7s ease-in-out infinite}
  .tooltip .tt-soon{margin-top:2px;font-size:10px;letter-spacing:.7px;text-transform:uppercase;
    font-weight:700;color:var(--gold)}

  footer{
    color:var(--muted);font-size:12.5px;text-align:center;
    padding:2px 12px 22px;line-height:1.5;
  }
  footer a{color:var(--muted)}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);vertical-align:middle;margin-right:5px}
  .status-dot.ok{background:#4a9d5b}
  .status-dot.err{background:#c0563c}
</style>
</head>
<body>
  <header>
    <h1>Randall&rsquo;s World Cup 2026</h1>
    <div class="sub">Knockout bracket &middot; live scores as matches are played</div>
  </header>

  <div class="stage" id="stage" aria-label="World Cup 2026 knockout bracket"></div>

  <footer>
    <div><span class="status-dot" id="statusDot"></span><span id="status">Loading…</span></div>
  </footer>

<script>
"use strict";
/* ============================================================================
   Randall's World Cup 2026 — Auto-updating circular bracket
   Pure static, client-side. Based on the shadymccoy/WC26 radial bracket
   (design: Emilio Sansolini).

   Data sources (num = FIFA match number, 73–104, third place excluded):
     PRIMARY  ESPN scoreboard — real-time scores, live clocks, explicit winner
              flags, penalty shootout scores. Matched to bracket slots via a
              hardcoded map of FIFA match num -> stable ESPN event id.
     BACKUP   worldcup26.ir /get/games — its game ids ARE FIFA match numbers.
              Used when ESPN is unreachable or hasn't posted a final yet, and
              as a cross-check: if both sources disagree on a winner, ESPN is
              trusted and a warning is shown in the status line.

   Pipeline:
     fetchESPN()/fetchBackup() -> per-num normalized records
     mergeFeeds()              -> one feed + conflict list
     buildModel()              -> static skeleton + results (winners propagate in)
     render()                  -> SVG lines/dots/trophy + HTML circular flags
============================================================================ */

/* ----------------------------- Config -------------------------------------- */
const ESPN_URL   = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719";
const BACKUP_URL = "https://worldcup26.ir/get/games";
const POLL_MS      = 60000; // ESPN every minute — near-real-time during matches
const BACKUP_EVERY = 5;     // hit the backup every 5th tick (~5 min); also on ESPN failure

/* FIFA match num -> ESPN event id. Stable identifiers, verified 2026-07-01 by
   pairing official kickoff datetimes; immune to team-name spelling drift. */
const ESPN_EVENT = {
  73:"760486", 74:"760489", 75:"760488", 76:"760487", 77:"760492", 78:"760490",
  79:"760491", 80:"760495", 81:"760494", 82:"760493", 83:"760496", 84:"760497",
  85:"760498", 86:"760500", 87:"760501", 88:"760499",
  89:"760503", 90:"760502", 91:"760504", 92:"760505",
  93:"760506", 94:"760507", 95:"760509", 96:"760508",
  97:"760510", 98:"760511", 99:"760512", 100:"760513",
  101:"760514", 102:"760515", 104:"760517"
};
const EVENT_NUM = {};
for (const [n,id] of Object.entries(ESPN_EVENT)) EVENT_NUM[id] = +n;

/* Team name -> ISO 3166-1 alpha-2 (flagcdn slug), keyed by canonical names. */
const ISO = {
  "South Africa":"za","Canada":"ca","Germany":"de","Paraguay":"py",
  "Netherlands":"nl","Morocco":"ma","Brazil":"br","Japan":"jp",
  "France":"fr","Sweden":"se","Ivory Coast":"ci","Norway":"no",
  "Mexico":"mx","Ecuador":"ec","England":"gb-eng","DR Congo":"cd",
  "USA":"us","Bosnia & Herzegovina":"ba","Belgium":"be","Senegal":"sn",
  "Portugal":"pt","Croatia":"hr","Spain":"es","Austria":"at",
  "Switzerland":"ch","Algeria":"dz","Argentina":"ar","Cape Verde":"cv",
  "Colombia":"co","Ghana":"gh","Australia":"au","Egypt":"eg"
};
/* Source spelling -> canonical name (ESPN and worldcup26.ir variants). */
const ALIAS = {
  "United States":"USA","Congo DR":"DR Congo",
  "Democratic Republic of the Congo":"DR Congo",
  "Bosnia-Herzegovina":"Bosnia & Herzegovina",
  "Bosnia and Herzegovina":"Bosnia & Herzegovina",
  "Cabo Verde":"Cape Verde","Côte d'Ivoire":"Ivory Coast"
};
function canon(name){
  if (!name) return null;
  const n = ALIAS[name] || name;
  // ESPN uses "Round of 32 12 Winner" / "TBD" placeholders before teams are set
  if (/winner$/i.test(n) || /^tbd$/i.test(n)) return null;
  return n;
}
function flagURL(team, w){ // w = flagcdn width bucket
  const iso = ISO[team];
  return iso ? `https://flagcdn.com/${w}/${iso}.png` : "";
}

/* ---- Static bracket skeleton: match num -> [childNum, childNum].
   Fixed and known in advance; results only overlay on top. R32 (73–88) are
   the leaves whose two participants are the team flags. (Match 103, the
   third-place play-off, is intentionally outside the radial tree.) */
const ROOT = 104;
const CHILDREN = {
  89:[74,77], 90:[73,75], 91:[76,78], 92:[79,80],
  93:[83,84], 94:[81,82], 95:[86,88], 96:[85,87],
  97:[89,90], 98:[93,94], 99:[91,92], 100:[95,96],
  101:[97,98], 102:[99,100],
  104:[101,102]
};
const R32_NUMS = [73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88];
const R32SET = new Set(R32_NUMS);
const ALL_NUMS = [...R32_NUMS, 89,90,91,92,93,94,95,96,97,98,99,100,101,102,104];

/* Reverse of CHILDREN: match num -> its parent (the next-round match its winner
   advances into). Built once from CHILDREN so the two never drift apart. */
const PARENT = {};
for (const [p, kids] of Object.entries(CHILDREN)){
  for (const c of kids) PARENT[c] = +p;
}

/* Ring level: R32 match node = 1 … Final = 5 (center). Flags live at level 0. */
function levelOf(num){
  if (R32SET.has(num)) return 1;
  if (num>=89 && num<=96) return 2;
  if (num>=97 && num<=100) return 3;
  if (num>=101 && num<=102) return 4;
  return 5; // final
}

/* --------------------------- Geometry -------------------------------------- */
const CX = 500, CY = 500;
// radius per ring level (viewBox units). 0 = outer flags … 5 = center.
const RADIUS = {0:430, 1:344, 2:260, 3:178, 4:98, 5:0};
const STEP = 360/32; // angular slot per outer flag

// 32 outer flags in tree DFS order (team1-subtree first). This reproduces the
// reference layout: left semicircle = first 16, right semicircle = last 16.
function dfsFlags(num){
  if (R32SET.has(num)) return [{num,slot:0},{num,slot:1}];
  const [a,b] = CHILDREN[num];
  return dfsFlags(a).concat(dfsFlags(b));
}
const FLAG_ORDER = dfsFlags(ROOT); // length 32

// flag index -> angle (deg, measured from 12 o'clock, clockwise positive).
function flagAngle(i){
  return (i<16) ? -(i+0.5)*STEP : ((i-16)+0.5)*STEP;
}
// match num -> angle (deg). Leaf = mean of its two flags; inner = mean of children.
const _angleMemo = {};
function angleOf(num){
  if (num in _angleMemo) return _angleMemo[num];
  let a;
  if (R32SET.has(num)){
    const idx = [];
    FLAG_ORDER.forEach((f,i)=>{ if(f.num===num) idx.push(i); });
    a = (flagAngle(idx[0]) + flagAngle(idx[1]))/2;
  } else {
    const [c1,c2] = CHILDREN[num];
    a = (angleOf(c1) + angleOf(c2))/2;
  }
  return (_angleMemo[num] = a);
}
// polar (radius, angleDeg) -> screen point
function pt(radius, angDeg){
  const r = angDeg*Math.PI/180;
  return [CX + radius*Math.sin(r), CY - radius*Math.cos(r)];
}

/* --------------------------- Data adapters ---------------------------------
   Both produce the same per-num record shape:
   { team1, team2,            canonical names or null (slot order = FIFA home/away)
     state,                   "pre" | "in" | "post"
     clock,                   display clock while live ("67'")
     s1, s2,                  current/final score (incl. extra time)
     p1, p2,                  penalty shootout scores or null
     aet,                     went past 90 minutes
     winnerIdx,               0 (team1) | 1 (team2) | null
     kick,                    kickoff Date or null
     src }                    "espn" | "backup"                                */

async function fetchESPN(){
  const res = await fetch(ESPN_URL, {cache:"no-store"});
  if (!res.ok) throw new Error("ESPN HTTP "+res.status);
  const data = await res.json();
  const out = {};
  for (const ev of (data.events||[])){
    const num = EVENT_NUM[ev.id];
    if (num == null) continue;
    const comp = (ev.competitions||[])[0];
    if (!comp) continue;
    const cs = comp.competitors||[];
    const home = cs.find(c=>c.homeAway==="home") || cs[0];
    const away = cs.find(c=>c.homeAway==="away") || cs[1];
    if (!home || !away) continue;
    const st = (ev.status && ev.status.type) || {};
    const detail = (st.description||"") + " " + (st.detail||"");
    const rec = {
      team1: canon(home.team && home.team.displayName),
      team2: canon(away.team && away.team.displayName),
      state: st.state || "pre",
      clock: (ev.status && ev.status.displayClock) || "",
      s1: +home.score || 0, s2: +away.score || 0,
      p1: home.shootoutScore != null ? +home.shootoutScore : null,
      p2: away.shootoutScore != null ? +away.shootoutScore : null,
      aet: /extra time|penalt/i.test(detail),
      winnerIdx: null,
      kick: ev.date ? new Date(ev.date) : null,
      src: "espn"
    };
    if (rec.state === "post"){
      if (home.winner === true) rec.winnerIdx = 0;
      else if (away.winner === true) rec.winnerIdx = 1;
      else if (rec.p1 != null && rec.p2 != null && rec.p1 !== rec.p2) rec.winnerIdx = rec.p1 > rec.p2 ? 0 : 1;
      else if (rec.s1 !== rec.s2) rec.winnerIdx = rec.s1 > rec.s2 ? 0 : 1;
    }
    out[num] = rec;
  }
  return out;
}

// strict numeric parse: the backup API sends "null"/"" strings for absent values
function numOrNull(v){
  if (v == null || v === "" || v === "null") return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

async function fetchBackup(){
  const res = await fetch(BACKUP_URL, {cache:"no-store"});
  if (!res.ok) throw new Error("backup HTTP "+res.status);
  const data = await res.json();
  const out = {};
  for (const g of (data.games||[])){
    const num = +g.id;
    if (!(num>=73 && num<=104) || num===103) continue;
    const finished = String(g.finished).toUpperCase() === "TRUE";
    const elapsed = String(g.time_elapsed||"");
    const live = !finished && elapsed && elapsed!=="notstarted" && elapsed!=="finished";
    const p1 = numOrNull(g.home_penalty_score), p2 = numOrNull(g.away_penalty_score);
    const rec = {
      team1: g.home_team_id !== "0" ? canon(g.home_team_name_en) : null,
      team2: g.away_team_id !== "0" ? canon(g.away_team_name_en) : null,
      state: finished ? "post" : (live ? "in" : "pre"),
      clock: live ? (/^\d+$/.test(elapsed) ? elapsed+"′" : elapsed) : "",
      s1: numOrNull(g.home_score) || 0, s2: numOrNull(g.away_score) || 0,
      p1, p2,
      aet: p1 != null && p2 != null, // pens imply extra time; plain a.e.t. isn't flagged by this source
      winnerIdx: null,
      kick: null,
      src: "backup"
    };
    if (finished){
      if (rec.p1 != null && rec.p2 != null && rec.p1 !== rec.p2) rec.winnerIdx = rec.p1 > rec.p2 ? 0 : 1;
      else if (rec.s1 !== rec.s2) rec.winnerIdx = rec.s1 > rec.s2 ? 0 : 1;
    }
    out[num] = rec;
  }
  return out;
}

/* Merge: ESPN wins; backup fills gaps (ESPN down, or backup has a final ESPN
   doesn't). If both report a final with different winners, keep ESPN and
   surface the conflict in the status line. */
function mergeFeeds(espn, backup){
  const out = {}, conflicts = [];
  for (const num of ALL_NUMS){
    const e = espn ? espn[num] : null;
    const b = backup ? backup[num] : null;
    let rec = e || b;
    if (e && b && b.state==="post"){
      if (e.state !== "post"){
        rec = Object.assign({}, b, {kick: e.kick, team1: e.team1||b.team1, team2: e.team2||b.team2});
      } else if (e.winnerIdx != null && b.winnerIdx != null && e.winnerIdx !== b.winnerIdx){
        conflicts.push(num);
      }
    }
    if (rec) out[num] = rec;
  }
  return {feed: out, conflicts};
}

// "1–1 (3–4 pens)" / "2–1 a.e.t." / "2–0" for a finished record
function scoreLabel(rec){
  if (!rec || rec.state !== "post") return "";
  const base = `${rec.s1}–${rec.s2}`;
  if (rec.p1 != null && rec.p2 != null) return `${base} (${rec.p1}–${rec.p2} pens)`;
  if (rec.aet) return `${base} a.e.t.`;
  return base;
}

/* Build the resolved model: for every node compute its two participants and its
   winner. Participants of an inner node = winners of its children (propagated
   inward); a missing side stays null (TBD). */
function buildModel(feed){
  const node = {};
  const _w = {};
  function participants(num){
    if (R32SET.has(num)){
      const r = feed[num] || {};
      return [r.team1 || null, r.team2 || null];
    }
    const [c1,c2] = CHILDREN[num];
    return [winner(c1), winner(c2)];
  }
  function winner(num){
    if (num in _w) return _w[num];
    const rec = feed[num];
    let w = null;
    if (rec && rec.winnerIdx != null){
      const p = participants(num);
      let idx = rec.winnerIdx;
      // safety: if the source's home/away order is flipped vs the tree, unflip
      if (rec.team1 && rec.team2 && p[0] && p[1] && rec.team1===p[1] && rec.team2===p[0]) idx = 1-idx;
      w = p[idx] || (idx===0 ? rec.team1 : rec.team2) || null;
    }
    return (_w[num] = w);
  }
  for (const num of ALL_NUMS){
    const rec = feed[num];
    node[num] = {
      participants: participants(num),
      winner: winner(num),
      label: scoreLabel(rec),
      live: (rec && rec.state==="in") ? {score:`${rec.s1}–${rec.s2}`, clock:rec.clock} : null,
      kick: (rec && rec.kick) || null,
      state: rec ? rec.state : "pre"
    };
  }
  return node;
}

/* ------------------------------ Rendering --------------------------------- */
const stage = document.getElementById("stage");
let prevWinners = {}; // num -> winner team, for diff/pop animation
let nowMs = Date.now(); // one consistent clock per render, for soon highlighting

function kickoff(node){ // -> e.g. "9 Jul · 4:00 PM PDT" in the viewer's own time zone
  if (!node.kick) return "Not played yet";
  const d = node.kick;
  const day = d.toLocaleDateString([], {day:"numeric", month:"short"});
  const t = d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", timeZoneName:"short"});
  return `${day} · ${t}`;
}
const SOON_MS = 120*60000; // gold "starting soon" ring window: 2 h before kickoff
// "live" | "soon" | "" for a match node. Live comes straight from the source
// state; soon from the schedule.
function matchStatus(node, now){
  if (!node) return "";
  if (node.live) return "live";
  if (node.state !== "pre" || node.label) return "";
  if (!node.participants[0] || !node.participants[1] || !node.kick) return "";
  const diff = node.kick.getTime() - now;
  return (diff > 0 && diff <= SOON_MS) ? "soon" : "";
}
// tooltip fields for a match node (same match backs both its outer flags and its winner flag)
function tipFor(model, num){
  const n = model[num];
  const teams = `${n.participants[0]||"TBD"} vs ${n.participants[1]||"TBD"}`;
  return { round:roundName(num), teams, score:n.label,
           livescore: n.live ? `${n.live.score}${n.live.clock ? " · "+n.live.clock : ""}` : "",
           when: n.label ? "" : kickoff(n),
           status: matchStatus(n, nowMs) };
}
// leading-space CSS class for a tip's live/soon state (""/" live"/" soon")
function hlClass(tip){ return tip.status ? " "+tip.status : ""; }

function connectorPath(num){
  // Smooth radial fork: each child flows inward to the parent node along a single
  // cubic. Tangents at both ends point along the radius, so every line leaves a
  // node aimed straight at the trophy and the whole tree fans cleanly to center.
  const lvl = levelOf(num);
  const Rc = RADIUS[lvl-1]; // children live on the outer ring
  const Rp = RADIUS[lvl];   // parent node on the inner ring
  const [a1,a2] = R32SET.has(num)
    ? [childFlagAngle(num,0), childFlagAngle(num,1)]
    : [angleOf(CHILDREN[num][0]), angleOf(CHILDREN[num][1])];
  const ap = angleOf(num);
  // one child->parent cubic, radial tangents at each end (t = handle length)
  function limb(childAng){
    const C = pt(Rc, childAng);       // child anchor (outer)
    const P = pt(Rp, ap);             // parent node (inner)
    const t = (Rc - Rp) * 0.4;        // handle length as a share of the ring gap
    const h1 = pt(Rc - t, childAng);  // pull inward from child, still on child's spoke
    const h2 = pt(Rp + t, ap);        // pull outward from parent, on parent's spoke
    return `M${C[0]} ${C[1]} C${h1[0]} ${h1[1]} ${h2[0]} ${h2[1]} ${P[0]} ${P[1]}`;
  }
  return limb(a1) + limb(a2);
}
// angle of one of a R32 node's two outer flags (slot 0/1)
function childFlagAngle(num, slot){
  for (let i=0;i<FLAG_ORDER.length;i++){
    if (FLAG_ORDER[i].num===num && FLAG_ORDER[i].slot===slot) return flagAngle(i);
  }
  return 0;
}

function trophySVG(){
  // simple trophy glyph centered at (CX,CY)
  return `<g transform="translate(${CX},${CY})" fill="var(--line)">
    <path d="M-16,-26 h32 v8 a16,18 0 0 1 -32,0 z" />
    <path d="M-22,-24 a8,8 0 0 0 8,8 v-4 a4,4 0 0 1 -4,-4 z" />
    <path d="M22,-24 a8,8 0 0 1 -8,8 v-4 a4,4 0 0 0 4,-4 z" />
    <rect x="-4" y="-6" width="8" height="12"/>
    <rect x="-12" y="6" width="24" height="5" rx="2"/>
    <rect x="-16" y="11" width="32" height="6" rx="2"/>
  </g>`;
}

function render(model){
  nowMs = Date.now();
  const newWinners = {};
  const flags = []; // {x,y,team,cls,tip}

  // 32 outer flags (always shown)
  FLAG_ORDER.forEach((f,i)=>{
    const team = (model[f.num].participants[f.slot]) || "";
    if (!team) return;
    const [x,y] = pt(RADIUS[0], flagAngle(i));
    const win = model[f.num].winner;
    const elim = win && win!==team; // this team lost its R32 match
    const tip = tipFor(model,f.num);
    flags.push({x,y,team,cls:"r0"+(elim?" eliminated":(win===team?" win":""))+hlClass(tip),
                tip});
  });

  // Build connectors + dots/winner-flags for every match node
  let conns = "";
  let dots = "";
  for (const num of ALL_NUMS){
    const lvl = levelOf(num);
    if (lvl<=4) conns += `<path class="conn" d="${connectorPath(num)}"/>`;
    const ang = angleOf(num);
    if (num===ROOT) continue; // final handled at center
    const [x,y] = pt(RADIUS[lvl], ang);
    const w = model[num].winner;
    if (w){
      newWinners[num] = w;
      const pop = (prevWinners[num]!==w) ? " pop" : "";
      // A winner flag sits on the way toward the center, so its tooltip describes
      // where the team goes NEXT (result if played, otherwise the schedule) rather
      // than the match it already won. The match just won is still on the team's
      // outer flag. PARENT[num] is the next-round match; fall back to num if absent.
      const nextNum = PARENT[num];
      const tip = nextNum!=null ? tipFor(model,nextNum) : tipFor(model,num);
      flags.push({x,y,team:w,cls:`r${lvl} win${pop}${hlClass(tip)}`, tip});
    } else {
      dots += `<circle class="dot" cx="${x}" cy="${y}" r="4"/>`;
    }
  }

  // Final / center
  const finalNode = model[ROOT];
  // Semifinal winners flow into the trophy along the same smooth radial cubic as
  // the rest of the tree (parent angle = 0 at the center).
  function centerLimb(childNum){
    const ca = angleOf(childNum), Rc = RADIUS[4];
    const C = pt(Rc, ca), t = Rc*0.4;
    const h1 = pt(Rc - t, ca);
    return `<path class="conn" d="M${C[0]} ${C[1]} C${h1[0]} ${h1[1]} ${CX} ${CY} ${CX} ${CY}"/>`;
  }
  let center = centerLimb(101) + centerLimb(102);
  let champFlag = null;
  if (finalNode.winner){
    newWinners[ROOT] = finalNode.winner;
    const pop = (prevWinners[ROOT]!==finalNode.winner) ? " pop" : "";
    const t = tipFor(model,ROOT); t.round = "Champion";
    champFlag = {x:CX,y:CY,team:finalNode.winner,cls:`champ${pop}`,tip:t};
  } else {
    center += trophySVG();
  }

  // Assemble SVG (lines + dots + trophy) then the flag overlay
  let html = `<svg viewBox="0 0 1000 1000" role="img">${conns}${center}${dots}</svg>`;
  const allFlags = champFlag ? flags.concat([champFlag]) : flags;
  for (const fl of allFlags){
    const w = fl.cls.indexOf("champ")>=0 ? "w320" : "w160";
    const src = flagURL(fl.team, w);
    const left = (fl.x/1000*100).toFixed(3);
    const top  = (fl.y/1000*100).toFixed(3);
    const t = fl.tip || {round:"",teams:fl.team,score:"",when:"",livescore:""};
    const data = `data-round="${escapeAttr(t.round)}" data-teams="${escapeAttr(t.teams)}" `+
                 `data-score="${escapeAttr(t.score||"")}" data-when="${escapeAttr(t.when||"")}" `+
                 `data-livescore="${escapeAttr(t.livescore||"")}" data-status="${escapeAttr(t.status||"")}"`;
    if (src){
      // on image error, fall back to a neutral circle so the bracket never gaps
      html += `<img class="flag ${fl.cls}" src="${src}" alt="${escapeAttr(fl.team)}" ${data} loading="lazy"
                 style="left:${left}%;top:${top}%" onerror="this.removeAttribute('src');this.style.background='#cfc9bd'"/>`;
    } else {
      // unknown team string -> neutral placeholder so the bracket never blanks
      html += `<div class="flag ${fl.cls}" ${data} style="left:${left}%;top:${top}%;background:#cfc9bd"></div>`;
    }
  }
  stage.innerHTML = html;
  prevWinners = newWinners;
}

function roundName(num){
  const l = levelOf(num);
  return ["","Round of 32","Round of 16","Quarter-final","Semi-final","Final"][l];
}
function escapeAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function escapeHTML(s){ return escapeAttr(s).replace(/>/g,"&gt;"); }

/* ---- Custom tooltip: hover on desktop, tap on touch ---- */
const tipEl = document.createElement("div");
tipEl.className = "tooltip";
document.body.appendChild(tipEl);

function showTip(el){
  const d = el.dataset;
  if (!d || !d.teams) return;
  let scoreHTML;
  if (d.score){
    scoreHTML = `<div class="tt-score">${escapeHTML(d.score)}</div>`;
  } else if (d.status === "live"){
    // Live: real running score + match clock straight from ESPN.
    scoreHTML = `<div class="tt-score live"><span class="live-dot"></span>${escapeHTML(d.livescore || "Live")}</div>`;
  } else {
    scoreHTML = `<div class="tt-score pending">${escapeHTML(d.when || "Not played yet")}</div>`
              + (d.status === "soon" ? `<div class="tt-soon">Starting soon</div>` : "");
  }
  tipEl.innerHTML =
    (d.round ? `<div class="tt-round">${escapeHTML(d.round)}</div>` : "") +
    `<div class="tt-teams">${escapeHTML(d.teams)}</div>` + scoreHTML;
  const r = el.getBoundingClientRect();
  const cx = Math.min(Math.max(r.left + r.width/2, 8), window.innerWidth - 8);
  const flip = r.top < 90; // near top edge -> show below the flag
  tipEl.classList.toggle("below", flip);
  tipEl.style.left = cx + "px";
  tipEl.style.top  = (flip ? r.bottom : r.top) + "px";
  tipEl.classList.add("on");
}
function hideTip(){ tipEl.classList.remove("on"); }

// hover (desktop)
stage.addEventListener("pointerover", e=>{
  const el = e.target.closest(".flag");
  if (el && e.pointerType!=="touch") showTip(el);
});
stage.addEventListener("pointerout", e=>{
  if (e.target.closest(".flag") && e.pointerType!=="touch") hideTip();
});
// tap (touch): toggle, and dismiss when tapping elsewhere
stage.addEventListener("click", e=>{
  const el = e.target.closest(".flag");
  if (el){ e.stopPropagation(); tipEl.classList.contains("on") ? hideTip() : showTip(el); }
});
document.addEventListener("click", ()=>hideTip());
window.addEventListener("scroll", hideTip, {passive:true});

/* ------------------------------- Update loop ------------------------------ */
const statusEl = document.getElementById("status");
const dotEl = document.getElementById("statusDot");
let lastGoodAt = null;
let tickN = 0;
let lastEspnFeed = null, lastBackupFeed = null;

function stamp(ok, msg){
  dotEl.className = "status-dot " + (ok?"ok":"err");
  const t = lastGoodAt ? lastGoodAt.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "—";
  statusEl.textContent = (msg ? msg+" · " : "") + "updated " + t;
}

async function tick(){
  tickN++;
  let espnOk = false;
  try{
    lastEspnFeed = await fetchESPN();
    espnOk = true;
  }catch(err){
    console.warn("ESPN fetch failed:", err);
  }
  // Backup/cross-check: first tick, every 5th tick, and whenever ESPN fails
  if (tickN===1 || tickN % BACKUP_EVERY === 0 || !espnOk){
    try{ lastBackupFeed = await fetchBackup(); }
    catch(err){ console.warn("backup fetch failed:", err); }
  }
  if (lastEspnFeed || lastBackupFeed){
    const {feed, conflicts} = mergeFeeds(lastEspnFeed, lastBackupFeed);
    lastGoodAt = new Date();
    render(buildModel(feed));
    let msg = "";
    if (!espnOk) msg = lastEspnFeed ? "ESPN stale, retrying" : "ESPN down · backup data";
    if (conflicts.length) msg += (msg?" · ":"") + "⚠ sources disagree: match "+conflicts.join(", ");
    stamp(espnOk, msg);
  } else {
    // Never blank the bracket — keep last-good on screen, quiet retry
    stamp(false, "offline, retrying");
  }
}

tick();
setInterval(tick, POLL_MS);
</script>
